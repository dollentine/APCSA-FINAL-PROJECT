<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Recipe Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>AI Recipe Generator</h1>

    <p class="subtitle">
        Enter ingredients and generate recipes
    </p>

    <div class="recipe-generator">

        <textarea
            id="ingredientsInput"
            placeholder="Example: eggs, cheese, bread, milk"
        ></textarea>

        <br><br>

        <button onclick="generateRecipe()">
            Generate Recipe
        </button>

        <br><br>

        <div id="recipeOutput"></div>

    </div>

    <br>

    <button onclick="window.location.href='/'">
        Back Home
    </button>

</div>

<script>

async function generateRecipe() {

    const ingredients =
        document.getElementById("ingredientsInput").value;

    const output =
        document.getElementById("recipeOutput");

    if (!ingredients.trim()) {

        output.innerHTML =
            "<p>Please enter ingredients first.</p>";

        return;
    }

    output.innerHTML =
        "<p>Generating recipe...</p>";

    try {

        const response = await fetch("/api/chat", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                message:
                `Create a recipe using these ingredients: ${ingredients}.
                
                Include:
                - recipe name
                - ingredients
                - step-by-step instructions
                - estimated cooking time`
            })

        });

        const data = await response.json();

        output.innerHTML = `
            <div class="recipe-card">
                <h3>Generated Recipe</h3>
                <p>${data.response.replace(/\n/g, "<br>")}</p>
            </div>
        `;

    }

    catch(error) {

        console.log(error);

        output.innerHTML =
            "<p>Something went wrong.</p>";
    }
}

</script>

</body>
</html>
