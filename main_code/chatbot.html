<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>

    <style>
        body { font-family: Arial; margin: 40px; }
        #chatbox {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }
        .user { color: blue; }
        .ai { color: green; }
    </style>
</head>

<body>

<h2>Cooking AI Chatbot</h2>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>

<br><br>
<button onclick="window.location.href='/'">Back</button>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatbox = document.getElementById("chatbox");

    const message = input.value.trim();
    if (!message) return;

    chatbox.innerHTML += `<p class="user"><b>You:</b> ${message}</p>`;
    input.value = "";

    try {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        chatbox.innerHTML += `<p class="ai"><b>AI:</b> ${data.response}</p>`;
        chatbox.scrollTop = chatbox.scrollHeight;

    } catch (error) {
        console.error(error);
        chatbox.innerHTML += `<p style="color:red;">Error connecting to server</p>`;
    }
}
</script>

</body>
</html>
